---
layout: page
---

<div class="post">
  <div>
    <p class="post_title">Tags</p>
  </div>
  <div class="post_content">
    {% assign sorted_tags = site.tags | sort %}
    {% for tag in sorted_tags %}
    <div id="{{ tag[0] | slugify }}">
      <h3>{{ tag[0] }}</h3>
      <ul>
        {% for post in tag[1] %}
        <li>
          <span class="post_date">{{ post.date | date: "%b %-d, %Y" }}</span>
          &nbsp;<a href="{{ post.url }}">{{ post.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
    {% endfor %}
  </div>
</div>
